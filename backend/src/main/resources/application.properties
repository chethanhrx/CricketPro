# ============================================
# CricketPro — Application Configuration
# ============================================

spring.application.name=CricketPro

# ── Server ──
server.port=8080

# ── Database (H2 for Development) ──
spring.datasource.url=jdbc:h2:file:./data/cricketpro_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ── JWT Configuration ──
app.jwt.secret=CricketPro2026SuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!!
app.jwt.expiration-ms=86400000

# ── CORS ──
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── Auction Defaults ──
app.auction.default-timer-seconds=15
app.auction.default-min-increment=100
app.auction.player-intro-seconds=10

# ── Logging ──
logging.level.com.cricketpro=DEBUG
logging.level.org.springframework.web.socket=DEBUG
