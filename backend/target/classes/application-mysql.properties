# ============================================
# CricketPro — MySQL Production Profile
# ============================================
# Activate with: --spring.profiles.active=mysql

spring.datasource.url=jdbc:mysql://localhost:3306/cricketpro_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=cricketpro
spring.datasource.password=${MYSQL_PASSWORD:cricketpro_pass}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.h2.console.enabled=false
